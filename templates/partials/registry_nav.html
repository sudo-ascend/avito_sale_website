<div class="registry-toolbar d-flex flex-column flex-xl-row justify-content-between align-items-xl-center gap-3 mb-4">
    <div class="registry-nav d-flex flex-wrap gap-2 mb-0">
        <a href="{% url 'crm_order_list' %}" class="btn btn-sm {% if '/dashboard/crm/' in request.path %}btn-accent{% else %}btn-outline-dark{% endif %}">CRM</a>
    </div>

    {% if search_url %}
        <form method="get" action="{{ search_url }}" class="registry-search-form ms-xl-auto">
            <div class="input-group">
                <input type="text"
                       name="q"
                       value="{{ request.GET.q }}"
                       class="form-control">
                <button type="submit" class="btn btn-outline-dark" aria-label="Найти">
                    <i class="bi bi-search"></i>
                </button>
                <a href="{{ search_url }}" class="btn btn-outline-dark" aria-label="Сбросить поиск">
                    <i class="bi bi-x-lg"></i>
                </a>
            </div>
        </form>
    {% endif %}
</div>
