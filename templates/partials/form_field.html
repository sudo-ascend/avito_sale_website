<div class="mb-3">
    <label for="{{ field.id_for_label }}" class="form-label fw-semibold">
        {{ field.label }}
        {% if field.field.required %}<span class="text-danger">*</span>{% endif %}
        {% if field.help_text %}
            <button type="button"
                    class="btn btn-link form-help p-0 align-baseline ms-1"
                    data-bs-toggle="popover"
                    data-bs-trigger="hover focus"
                    data-bs-content="{{ field.help_text|striptags }}">
                ?
            </button>
        {% endif %}
    </label>
    <div class="{% if field.widget_type == 'checkboxselectmultiple' %}form-options{% endif %}">
        {{ field }}
    </div>
    {% if field.errors %}
        <div class="invalid-feedback d-block">
            {{ field.errors|join:", " }}
        </div>
    {% endif %}
</div>
